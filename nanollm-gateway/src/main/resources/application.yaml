spring:
  application:
    name: alibaba-openai-gateway

server:
  port: 28080

logging:
  level:
    org.springframework.cloud: DEBUG

llm:
  provider:
  - type: dashscope
    model-prefix: dashscope
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    alias:
      xiaomi:
        - tongyi-xiaomi-analysis-pro
        - tongyi-xiaomi-analysis-flash
    apikey:
      - ${DASHSCOPE_API_KEY}